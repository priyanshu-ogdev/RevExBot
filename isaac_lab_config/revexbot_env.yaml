environment:
  numEnvs: 4096
  episodeLength: 1000
  seed: 42

simulation:
  device: "cuda:0"         
  gravity: [0.0, 0.0, -9.81]
  dt: 0.005                  # 200 Hz control
  substeps: 4                # 800 Hz physics (Optimal for stability/perf balance)
  use_gpu: true
  renderer: "None"           # Headless for max throughput. Use "RayTracedLighting" for debug.

task:
  name: "RevEx_Loco_Manip"
  
  asset:
    usd_path: "output/revexbot.usd"
    fixBaseLink: false
    collisionGroup: "robot"
    collisionMask: "environment"
    self_collisions: true
  
  actuators:
    legs:
      joint_names: [".*_hip_.*", ".*_knee_.*", ".*_ankle_.*", "waist_yaw_joint"]
      stiffness: 150.0
      damping: 5.0
      armature: 0.01         # Prevents matrix singularities
    arms:
      joint_names: [".*_shoulder_.*", ".*_elbow_joint"]
      stiffness: 40.0
      damping: 1.5
      armature: 0.005
    hands:
      joint_names: [".*_FFJ.*", ".*_MFJ.*", ".*_RFJ.*", ".*_LFJ.*", ".*_THJ.*"] # Safer Regex
      stiffness: 10.0
      damping: 0.5
      armature: 0.001

  # Explicit Contact Sensors (Must be matched in your train.py ContactSensorCfg)
  contact_sensor_patterns:
    - ".*toe_link"
    - ".*_tip"
  
  observations:
    - projected_gravity
    - base_lin_vel
    - base_ang_vel
    - joint_pos
    - joint_vel
    - previous_action
    - foot_contact_forces
  
  actions:
    - joint_positions
  
  terminations:
    base_orientation:     # Kill episode if robot falls
      threshold: 0.7      # Dot product of up-vector
    joint_limits:         # Kill if joints exceed soft limits
      threshold: 0.95     # % of hard limit

  rewards:
    tracking_lin_vel: 1.0
    tracking_ang_vel: 0.5
    energy_cost: -0.001
    alive_bonus: 0.1
    action_rate_penalty: -0.01
    joint_accel_penalty: -0.005
    feet_air_time: 0.5    # Encourages a proper walking gait over shuffling
  
  domain_randomization:
    joint_friction: { range: [0.7, 1.3], operation: "scale" }
    joint_damping:  { range: [0.8, 1.2], operation: "scale" }
    link_mass:      { range: [0.9, 1.1], operation: "scale" }
    motor_strength: { range: [0.9, 1.1], operation: "scale" } # Simulates battery drop/wear