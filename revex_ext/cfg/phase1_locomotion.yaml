environment:
  numEnvs: 2048
  episodeLength: 1000
  seed: 42

simulation:
  device: "cuda:0"         
  gravity: [0.0, 0.0, -9.81]
  dt: 0.005                  # 200 Hz control
  substeps: 4                # 800 Hz physics
  use_gpu: true
  renderer: "None"           # Headless for training

task:
  name: "RevEx_Loco_Phase1"
  
  asset:
    # Modern Isaac Lab can parse MJCF directly! You can point this to the XML 
    # to skip the USD conversion step if you prefer: "assets/mjcf/asimov.xml"
    usd_path: "assets/usd/revexbot.usd" 
    fixBaseLink: false
    collisionGroup: "robot"
    collisionMask: "environment"
    
    # 🔥 UPGRADE: False for Phase 1 locomotion. Saves massive VRAM/Compute.
    self_collisions: false 
    
    # Natural Standing Pose (Athletic Crouch)
    default_joint_angles:
      left_hip_pitch_joint: 0.0
      left_knee_joint: 0.3
      left_ankle_pitch_joint: -0.15
      right_hip_pitch_joint: 0.0
      right_knee_joint: 0.3
      right_ankle_pitch_joint: -0.15
      waist_yaw_joint: 0.0
      left_shoulder_pitch_joint: 0.2
      left_elbow_joint: 0.5
      right_shoulder_pitch_joint: 0.2
      right_elbow_joint: 0.5
      left_wrist_yaw_joint: 0.0
      right_wrist_yaw_joint: 0.0
  
  actuators:
    # Isaac Lab will override the XML kp/kv with these stiffness/damping values
    legs:
      joint_names: [".*_hip_.*", ".*_knee_.*", ".*_ankle_.*", "waist_yaw_joint"]
      stiffness: 150.0
      damping: 5.0
      armature: 0.01
    arms:
      joint_names: [".*_shoulder_.*", ".*_elbow_joint", ".*_wrist_yaw_joint"]
      stiffness: 40.0
      damping: 1.5
      armature: 0.005
    hands:
      joint_names: [".*_thumb_.*", ".*_index_.*", ".*_middle_.*", ".*_ring_.*", ".*_pinky_.*"]
      stiffness: 3.0
      damping: 0.15
      armature: 0.001

  contact_sensor_patterns:
    - ".*ankle_roll_link"   # Main foot body (Ground Contact)
    - ".*toe_link"          # Toe tips
  
  observations:
    - projected_gravity
    - base_lin_vel
    - base_ang_vel
    - joint_pos
    - joint_vel
    - previous_action
    # 🔥 UPGRADE: Add hardware-realistic IMU data streams
    - imu_lin_acc           
    - imu_ang_vel           
  
  actions:
    - joint_positions
  
  terminations:
    base_orientation:     
      threshold: 0.7      
    joint_limits:         
      threshold: 0.95     

  rewards:
    tracking_lin_vel: 1.0
    tracking_ang_vel: 0.5
    energy_cost: -0.001
    alive_bonus: 0.1
    action_rate_penalty: -0.01
    joint_accel_penalty: -0.005
    feet_air_time: 0.5    
    joint_deviation: -0.1 
    torque_penalty: -0.0001
    # 🔥 UPGRADE: Penalize excessive arm flailing during walking
    arm_movement_penalty: -0.001 

  domain_randomization:
    joint_friction: { range: [0.7, 1.3], operation: "scale" }
    joint_damping:  { range: [0.8, 1.2], operation: "scale" }
    link_mass:      { range: [0.9, 1.1], operation: "scale" }
    motor_strength: { range: [0.9, 1.1], operation: "scale" }
    com_displacement: { range: [-0.05, 0.05], operation: "add" }