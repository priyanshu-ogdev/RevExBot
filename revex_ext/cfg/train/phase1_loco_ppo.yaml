params:
  seed: 42
  algo:
    name: a2c_continuous
  model:
    name: continuous_a2c_logstd
  network:
    name: actor_critic
    separate: True # SOTA: Asymmetric Critic
    space:
      continuous:
        mu_activation: None
        sigma_activation: None
        mu_init:
          name: default
        sigma_init:
          name: const_initializer
          val: 0.0
        fixed_sigma: True
    
    mlp:
      units: [512, 256, 128]
      activation: elu
      d2rl: False
      
    value:
      units: [512, 256, 128]
      activation: elu

  config:
    name: revex_loco_phase1
    env_name: rlgames
    device: 'cuda:0'
    mixed_precision: True      
    
    normalize_input: True
    normalize_value: True
    value_bootstrap: True
    clip_actions: True
    bounds_loss_coef: 0.0001
    
    num_actors: 4096 # Increased for faster convergence on simple task
    reward_shaper:
      scale_value: 1.0
    normalize_advantage: True
    
    gamma: 0.99
    tau: 0.95
    learning_rate: 3e-4
    lr_schedule: adaptive
    
    optimizer: adam
    kl_threshold: 0.01
    score_to_win: 20000
    max_epochs: 1000 # Reduced due to lower entropy
    save_best_after: 100
    save_frequency: 50
    
    grad_norm: 1.0
    entropy_coef: 0.001 # GAP 62 FIX: Low entropy for fast locking
    truncate_grads: True
    e_clip: 0.2
    
    horizon_length: 24
    minibatch_size: 8192
    mini_epochs: 5
    critic_coef: 1.0 # Balanced
    clip_value: True