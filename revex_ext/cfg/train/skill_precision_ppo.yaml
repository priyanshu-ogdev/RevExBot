params:
  seed: 42
  algo:
    name: a2c_continuous
  model:
    name: continuous_a2c_logstd
  network:
    name: actor_critic
    separate: True # SOTA: Asymmetric
    
    mlp:
      units: [512, 256, 128] 
      activation: elu
      
    value:
      units: [512, 256, 128]
      activation: elu

  config:
    name: revex_skill_precision
    env_name: rlgames
    device: 'cuda:0'
    mixed_precision: True
    ppo: True
    
    # SOTA Normalization & Bounds
    normalize_input: True
    normalize_value: True
    value_bootstrap: True
    clip_actions: True
    bounds_loss_coef: 0.0001 
    
    optimizer: adam
    lr_schedule: adaptive
    learning_rate: 5e-5
    weight_decay: 0.005
    
    # GAP 133 FIX: Increased KL Threshold for faster convergence
    kl_threshold: 0.02
    score_to_win: 50000
    max_epochs: 4000
    save_best_after: 500
    
    entropy_coef: 0.01        
    
    horizon_length: 64
    minibatch_size: 4096       
    mini_epochs: 5
    seq_len: 4