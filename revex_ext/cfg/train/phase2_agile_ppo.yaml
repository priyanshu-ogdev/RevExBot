params:
  seed: 42
  algo:
    name: a2c_continuous
  model:
    name: continuous_a2c_logstd
  network:
    name: actor_critic
    separate: False
    space:
      continuous:
        mu_activation: None
        sigma_activation: None
        mu_init:
          name: default
        sigma_init:
          name: const_initializer
          val: 0.0
        fixed_sigma: True
    mlp:
      units: [512, 256, 128]
      activation: elu
      d2rl: False
  config:
    name: revex_agile_phase2
    env_name: rlgames
    device: 'cuda:0'
    device_name: 'cuda:0'
    multi_gpu: False
    ppo: True
    mixed_precision: True      
    normalize_input: True
    normalize_value: True
    value_bootstrap: True
    num_actors: 2048
    reward_shaper:
      scale_value: 1.0
    normalize_advantage: True
    gamma: 0.99
    tau: 0.95
    
    # 🔥 PIVOT: SGD Optimization via RLGames Backend
    optimizer: sgd
    momentum: 0.9
    learning_rate: 1e-4        # Lowered to prevent catastrophic forgetting
    weight_decay: 0.001        # L2 Regularization  
    lr_schedule: adaptive
    
    clip_actions: True         # 🔥 MANDATORY: Prevents hardware wind-up
    schedule_type: standard
    kl_threshold: 0.008        # Tightened to prevent policy collapse on rough terrain
    score_to_win: 35000
    max_epochs: 3000           
    save_best_after: 200
    save_frequency: 100
    print_stats: True
    grad_norm: 1.0
    entropy_coef: 0.015        
    truncate_grads: True
    e_clip: 0.2
    horizon_length: 24
    minibatch_size: 8192
    mini_epochs: 5
    critic_coef: 2.0
    clip_value: True
    seq_len: 4                 # 🔥 SYNC: Maintains the identical temporal stack as Phase 1
    bounds_loss_coef: 0.0001