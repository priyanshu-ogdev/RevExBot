params:
  seed: 42
  algo:
    name: a2c_continuous
  model:
    name: continuous_a2c_logstd
  network:
    name: actor_critic
    separate: True # SOTA: Asymmetric Critic
    space:
      continuous:
        mu_activation: None
        sigma_activation: None
        mu_init:
          name: default
        sigma_init:
          name: const_initializer
          val: 0.0
        fixed_sigma: True
        
    mlp:
      units: [512, 256, 128]
      activation: elu
      d2rl: False
      
    value:
      units: [512, 256, 128]
      activation: elu

  config:
    name: revex_agile_phase2
    env_name: rlgames
    device: 'cuda:0'
    mixed_precision: True      
    
    normalize_input: True
    normalize_value: True
    value_bootstrap: True
    clip_actions: True
    bounds_loss_coef: 0.0001
    
    num_actors: 2048
    reward_shaper:
      scale_value: 1.0
    normalize_advantage: True
    
    gamma: 0.99
    tau: 0.95
    
    optimizer: adam
    learning_rate: 1e-4
    weight_decay: 0.001  
    lr_schedule: adaptive
    
    kl_threshold: 0.008 # Tight for smooth recovery
    score_to_win: 35000
    max_epochs: 3000           
    save_best_after: 200
    save_frequency: 100
    
    grad_norm: 1.0
    entropy_coef: 0.015 # Higher for exploration of recovery
    truncate_grads: True
    e_clip: 0.2
    
    horizon_length: 32 # Captures trip-recover lifecycle
    minibatch_size: 8192
    mini_epochs: 5
    critic_coef: 1.0 # GAP 61 FIX: Balanced Critic
    clip_value: True