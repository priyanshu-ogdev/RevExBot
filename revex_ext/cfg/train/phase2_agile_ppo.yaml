params:
  seed: 42
  algo:
    name: a2c_continuous
  model:
    name: continuous_a2c_logstd
  network:
    name: actor_critic
    separate: True 
    space:
      continuous:
        mu_activation: None
        sigma_activation: None
        mu_init:
          name: default
        sigma_init:
          name: const_initializer
          val: 0.0
        fixed_sigma: True
        
    mlp:
      units: [512, 256, 128]
      activation: elu
      d2rl: False
      
    value:
      units: [512, 256, 128]
      activation: elu

  config:
    name: revex_agile_phase2
    env_name: rlgames
    device: 'cuda:0'
    mixed_precision: True      
    
    normalize_input: True
    normalize_value: True
    value_bootstrap: True
    clip_actions: True
    bounds_loss_coef: 0.0001
    
    num_actors: 16384 
    reward_shaper:
      scale_value: 1.0
    normalize_advantage: True
    
    # 🚨 PATCHED: Horizon tightened to prioritize immediate impact stabilization
    gamma: 0.99 
    tau: 0.95    
    learning_rate: 1e-4
    min_lr: 1e-6       
    lr_schedule: adaptive
    
    optimizer: adam
    weight_decay: 0.001  
    kl_threshold: 0.008  
    score_to_win: 25000
    max_epochs: 2500           
    save_best_after: 100
    save_frequency: 50
    
    grad_norm: 1.0
    entropy_coef: 0.01
    # Prolonged exploration schedule for dynamic terrain adaptation
    entropy_coef_schedule: [(0, 0.01), (1500, 0.001)]
    truncate_grads: True
    e_clip: 0.2
    
    # 🚨 ADA SCALE: MoE Parity Locked
    horizon_length: 64
    minibatch_size: 65536 
    # 🚨 PATCHED: Reduced from 8 to prevent trajectory overfitting
    mini_epochs: 5        
    
    critic_coef: 1.0 
    clip_value: True