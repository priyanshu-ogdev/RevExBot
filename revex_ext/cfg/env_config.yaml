# cfg/env_config.yaml
# DISTRIBUTED FACTORY CONFIGURATION (VISION + SIMULATION)

system:
  active_hardware: "dgx_spark" # Designate 'dgx_spark' for RL, '4070_ti' for Vision

cluster_paths:
  drop_zone: "raw_media/"                  # External ingest for .mp4 files
  processed_kinematics: "data/motions/"    # Destination for AMP .npy manifolds
  registry_json: "data/expert_registry.json"
  job_queue_json: "data/job_queue.json"
  weights_dir: "data/weights/"             # Immutable storage for frozen .pth experts
  eval_videos: "data/eval_videos/"

evaluation:
  eval_episodes: 20
  render_headless: True
  min_success_rate: 0.95 

vlm_orchestration:
  model_id: "Qwen/Qwen2.5-VL-3B-Instruct"
  max_frames_per_video: 8
  context_window: 8192

profiles:
  4070_ti:
    role: "vision_daemon_and_retargeting"
    max_vram_gb: 16
    use_mixed_precision: true   
    intra_op_threads: 4
    
  dgx_spark:
    role: "isaac_lab_simulation_and_skrl"
    max_vram_gb: 128
    use_mixed_precision: true
    intra_op_threads: 16

moe_architecture:
  base_locomotion_policy: "data/weights/expert_loco_v1.pth"
  base_agile_policy: "data/weights/expert_agile_v1.pth"
  router_distillation_epochs: 50
  router_save_path: "runs/phase3/router/nn/" # SKRL output directory