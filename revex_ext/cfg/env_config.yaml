# cfg/env_config.yaml
# THE MASTER FORGE CONFIGURATION (RTX 6000 ADA)

system:
  active_hardware: "rtx_6000_ada"
  # 🚨 STRICT MEMORY CONTROL: Forces PyTorch to release cached memory back to the OS 
  # before handing the GPU from the Vision Daemon to Isaac Lab.
  force_vram_flush_between_phases: true

cluster_paths:
  drop_zone: "raw_media/"                  # External ingest for .mp4 files
  processed_kinematics: "data/motions/"    # Destination for AMP .npy manifolds
  registry_json: "data/expert_registry.json"
  job_queue_json: "data/job_queue.json"
  weights_dir: "data/weights/"             # Immutable storage for frozen .pth experts
  eval_videos: "data/eval_videos/"

evaluation:
  eval_episodes: 20
  render_headless: True
  min_success_rate: 0.95 

vlm_orchestration:
  model_id: "Qwen/Qwen2.5-VL-3B-Instruct"
  # 🚨 ADA UPGRADE: Doubled temporal resolution. 48GB VRAM easily absorbs 
  # the massive KV cache required for 16-frame kinematic extraction.
  max_frames_per_video: 16 
  context_window: 8192

profiles:
  rtx_6000_ada:
    role: "unified_master_forge"
    max_vram_gb: 48
    system_ram_gb: 128
    use_mixed_precision: true   
    # 🚨 SYSTEM SCALE: High thread count to prevent CPU bottlenecking 
    # when caching 2M transition buffers into the 128GB System RAM.
    intra_op_threads: 24 

moe_architecture:
  base_locomotion_policy: "data/weights/expert_loco_v1.pth"
  base_agile_policy: "data/weights/expert_agile_v1.pth"
  # 🚨 ROUTER STABILIZATION: Increased distillation epochs. With 16k envs, 
  # the SKRL router needs slightly more time to cleanly balance expert gating.
  router_distillation_epochs: 100 
  router_save_path: "runs/phase3/router/nn/"